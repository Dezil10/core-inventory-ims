<!DOCTYPE html>
<html>

<head>
<title>Stock History</title>
</head>

<body>

<h1>Stock Movement History</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Product</th>
<th>Type</th>
<th>Quantity</th>
<th>Date</th>
</tr>

{% for m in movements %}

<tr>
<td>{{m[0]}}</td>
<td>{{m[1]}}</td>
<td>{{m[2]}}</td>
<td>{{m[3]}}</td>
<td>{{m[4]}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Back to Dashboard</a>

</body>

</html>
